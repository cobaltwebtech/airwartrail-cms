name = "airwartrail-video-manager"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-04-29"
compatibility_flags = [ "nodejs_compat" ]

[assets]
binding = "ASSETS"
directory = "./dist"

[[r2_buckets]]
bucket_name = "airwartrail-assets"
preview_bucket_name = "airwartrail-assets-dev"
binding = "airwartrail_assets"

[observability]
enabled = true

[vars]
BETTER_AUTH_URL = "https://video.airwartrail.com"
PUBLIC_BUNNY_LIBRARY_ID = "416789"
PUBLIC_BUNNY_STREAM_CDN = "vz-91a12c63-3f2.b-cdn.net"
TURNSTILE_PUBLIC_KEY = "3x00000000000000000000FF"